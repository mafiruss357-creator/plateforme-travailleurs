<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Plateforme Travailleurs</title>

<style>
/* --- Background et police --- */
body {
  font-family: 'Arial', sans-serif;
  margin: 0;
  background-image: url("https://images.unsplash.com/photo-1503387762-592deb58ef4e");
  background-size: cover;
  background-position: center;
  transition: background 0.5s;
}

/* --- Overlay sombre pour lisibilité --- */
.overlay {
  background: rgba(0,0,0,0.6);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: opacity 0.5s;
}

/* --- Containers --- */
.container {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 350px;
  text-align: center;
  box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
  opacity: 1;
  transition: opacity 0.5s, transform 0.5s;
}

.container h2 {
  margin-bottom: 20px;
}

/* --- Inputs et boutons --- */
input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
  transition: transform 0.2s, background 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* Couleurs différentes selon le type */
#choix button {
  background: #27ae60;
  color: white;
}

#formulaire button {
  background: #2980b9;
  color: white;
}

#merci button#whaButton {
  background: #25D366; /* vert WhatsApp */
  color: white;
}

#merci button:last-child {
  background: #f39c12;
  color: white;
}

/* --- Texte GPS --- */
#gps {
  margin-top: 10px;
  font-size: 14px;
  color: green;
}
</style>

</head>

<body>

<div class="overlay">

  <!-- Choix utilisateur -->
  <div class="container" id="choix">
    <h2>Bienvenue</h2>
    <button onclick="choisir('travailleur')">Je suis un homme de métier</button>
    <button onclick="choisir('employeur')">Je suis un employeur</button>
  </div>

  <!-- Formulaire -->
  <div class="container" id="formulaire" style="display:none">
    <h2>Inscription</h2>
    <input type="text" id="nom" placeholder="Nom" required>
    <input type="text" id="telephone" placeholder="Téléphone" required>
    <input type="text" id="metier" placeholder="Métier / Poste recherché" required>
    <p id="gps">Localisation en cours...</p>
    <button onclick="envoyer()">Envoyer</button>
  </div>

  <!-- Page de remerciement -->
  <div class="container" id="merci" style="display:none">
    <h2>Merci pour votre inscription !</h2>
    <p>Vous pouvez maintenant rejoindre notre groupe WhatsApp :</p>
    <button id="whaButton" onclick="">Rejoindre le groupe WhatsApp</button>
    <button onclick="nouveauFormulaire()">Remplir à nouveau le formulaire</button>
  </div>

</div>

<script>
let typeUtilisateur = "";
let latitude = "";
let longitude = "";

// Choix utilisateur
function choisir(type) {
  typeUtilisateur = type;

  // Animation de transition
  document.getElementById("choix").style.opacity = 0;
  setTimeout(() => {
    document.getElementById("choix").style.display = "none";
    document.getElementById("formulaire").style.display = "block";
    document.getElementById("formulaire").style.opacity = 0;
    setTimeout(() => {
      document.getElementById("formulaire").style.opacity = 1;
    }, 50);
  }, 300);

  // Géolocalisation
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      latitude = position.coords.latitude;
      longitude = position.coords.longitude;
      document.getElementById("gps").innerHTML = "Position capturée ✔";
    }, function(error) {
      document.getElementById("gps").innerHTML = "Impossible de récupérer la position";
    });
  } else {
    document.getElementById("gps").innerHTML = "Géolocalisation non supportée";
  }
}

// Envoi des données
function envoyer() {
  let nom = document.getElementById("nom").value.trim();
  let tel = document.getElementById("telephone").value.trim();
  let metier = document.getElementById("metier").value.trim();

  if (!nom || !tel || !metier) {
    alert("Veuillez remplir tous les champs");
    return;
  }

  if (!latitude || !longitude) {
    alert("La position n'a pas été capturée. Autorisez la géolocalisation.");
    return;
  }

  let data = {
    type: typeUtilisateur,
    nom: nom,
    telephone: tel,
    metier: metier,
    latitude: latitude,
    longitude: longitude
  };

  fetch("https://sheetdb.io/api/v1/x7rqgbros239h", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(response => response.text())
  .then(result => {
    // Afficher page de remerciement
    document.getElementById("formulaire").style.opacity = 0;
    setTimeout(() => {
      document.getElementById("formulaire").style.display = "none";
      document.getElementById("merci").style.display = "block";
      document.getElementById("merci").style.opacity = 0;
      setTimeout(() => {
        document.getElementById("merci").style.opacity = 1;
      }, 50);

      // Bouton WhatsApp
      let whaButton = document.getElementById("whaButton");
      if(typeUtilisateur === "travailleur") {
        whaButton.setAttribute("onclick", "window.open('https://chat.whatsapp.com/BRjefJUJbEAGWKECEnlYHL','_blank')");
        whaButton.innerHTML = "Rejoindre le groupe WhatsApp Travailleurs";
      } else {
        whaButton.setAttribute("onclick", "window.open('https://chat.whatsapp.com/Ik5AxQYNO9O07xNKPAmE53','_blank')");
        whaButton.innerHTML = "Rejoindre le groupe WhatsApp Employeurs";
      }

      // Réinitialiser formulaire
      document.getElementById("nom").value = "";
      document.getElementById("telephone").value = "";
      document.getElementById("metier").value = "";
      document.getElementById("gps").innerHTML = "Localisation en cours...";
    }, 300);
  })
  .catch(error => {
    console.error("Erreur :", error);
    alert("Erreur lors de l'envoi. Vérifiez votre connexion.");
  });
}

// Revenir au formulaire
function nouveauFormulaire() {
  document.getElementById("merci").style.opacity = 0;
  setTimeout(() => {
    document.getElementById("merci").style.display = "none";
    document.getElementById("choix").style.display = "block";
    document.getElementById("choix").style.opacity = 0;
    setTimeout(() => {
      document.getElementById("choix").style.opacity = 1;
    }, 50);
  }, 300);
}
</script>

</body>
</html>
